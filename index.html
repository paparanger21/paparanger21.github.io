<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 블로그</title>
<link rel="icon" href="./profile.png">
<link rel="preload" href="./posts.json" as="fetch" crossorigin="anonymous">
<link rel="preload" href="./profile.png" as="image">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #111; font-family: 'Apple SD Gothic Neo',
'Noto Sans KR', sans-serif; min-height: 100vh; display: flex;
justify-content: center; padding: 48px 20px; }
.container { width: 100%; max-width: 480px; }
.profile { text-align: center; margin-bottom: 40px; }
.profile img { width: 64px; height: 64px; border-radius: 50%;
object-fit: cover; margin-bottom: 12px; }
.profile h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.profile p { margin-top: 8px; font-size: 14px; color: #999; }
.section-title { font-size: 12px; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
.post-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.post-item { display: block; border: 1px solid #e8e8e8; border-radius: 10px;
padding: 16px 20px; text-decoration: none; color: inherit; transition: background 0.15s;
}
.post-item:hover { background: #f7f7f7; }
.post-item .post-header { display: flex; align-items: center; gap: 8px; }
.post-item .post-title { font-size: 15px; font-weight: 600; line-height: 1.5; color: #111;
}
.post-item .post-date { font-size: 12px; color: #bbb; margin-top: 4px; }
.new-badge { font-size: 10px; font-weight: 700; color: #fff; background: #ff6b2b;
padding: 2px 6px; border-radius: 4px; white-space: nowrap;
animation: hotpulse 1.8s ease-in-out infinite; }
@keyframes hotpulse {
0%,100% { box-shadow: 0 0 0 0 rgba(255,107,43,0.6); }
50% { box-shadow: 0 0 0 5px rgba(255,107,43,0); } }
.more-note { font-size: 12px; color: #bbb; text-align: center; margin-bottom: 24px; }
.blog-link { display: block; text-align: center; border: 1px solid #e8e8e8;
border-radius: 10px; padding: 15px; text-decoration: none;
color: #555; font-size: 14px; transition: background 0.15s; }
.blog-link:hover { background: #f7f7f7; color: #111; }
.loading { text-align: center; color: #bbb; font-size: 14px; padding: 40px 0; }
.error { text-align: center; color: #bbb; font-size: 14px; padding: 20px 0; }
</style>
</head>
<body>
<div class="container">
<div class="profile">
<img src="./profile.png" alt="프로필" width="64" height="64" fetchpriority="high"/>
<h1>파파레인저</h1>
<p>《파파레인저,육아포스》(상반기 출간)</p>
</div>
<div class="section-title">최근 글</div>

<div class="post-list" id="post-list">
<div class="loading">불러오는 중...</div>
</div>
<div class="more-note" id="more-note"></div>
<a class="blog-link" href="https://blog.naver.com/spapa_21" target="_blank">
블로그 전체 글 보기 →
</a>
</div>
<script>
async function loadPosts() {
const list = document.getElementById('post-list');
const note = document.getElementById('more-note');
try {
const res = await fetch('./posts.json', { priority: 'high' });
const data = await res.json();
if (!data.items || data.items.length === 0) {
list.innerHTML = '<div class="error">글을 불러올 수 없어요.</div>'; return;
}
list.innerHTML = data.items.map((item, i) => `
<a class="post-item" href="${item.link}" target="_blank">
<div class="post-header">
<div class="post-title">${item.title}</div>
${i === 0 ? '<span class="new-badge">NEW</span>' : ''}
</div>
<div class="post-date">${item.pubDate}</div>
</a>`).join('');
note.textContent = '+ 매일 업로드 됩니다';
} catch (e) {
list.innerHTML = '<div class="error">잠시 후 다시 시도해주세요.</div>';
}
}
loadPosts();
</script>
</body></html>
